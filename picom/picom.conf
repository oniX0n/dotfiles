# ~/.config/picom/picom.conf
# Confiuration file for picom compositor. For existing settings look up /etc/xdg/picom.conf

# -----------------------------------

# Disable shadows on windows
shadow = false;

# -----------------------------------

# Fade in and out of windows
fading = false;

# Opacity change between steps while fading in. (0.01 - 1.0, defaults to 0.028)
fade-in-step = 0.03;

# Opacity change between steps while fading out. (0.01 - 1.0, defaults to 0.03)
fade-out-step = 0.03;

# The time between steps in fade step, in milliseconds. (> 0, defaults to 10)
fade-delta = 10;

# Specify a list of conditions of windows that should not be faded.
fade-exclude = [];

# Do not fade on window open/close.
no-fading-openclose = false;

# Do not fade destroyed ARGB windows with WM frame. Workaround of bugs in Openbox, Fluxbox, etc.
#no-fading-destroyed-argb = false;

# -----------------------------------

# Opacity of inactive windows. (0.1 - 1.0, defaults to 1.0)
inactive-opacity = 1.0;

# Opacity of window titlebars and borders. (0.1 - 1.0, disabled by default)
frame-opacity = 1.0;

# Default opacity for dropdown menus and popup menus. (0.0 - 1.0, defaults to 1.0)
menu-opacity = 1.0;

# Let inactive opacity set by -i override the '_NET_WM_OPACITY' values of windows.
inactive-opacity-override = false;

# Default opacity for active windows. (0.0 - 1.0, defaults to 1.0)
active-opacity = 1.0;

# Dim inactive windows. (0.0 - 1.0, defaults to 0.0)
inactive-dim = 0.0;

# Specify a list of conditions of windows that should always be considered focused.
focus-exclude = [];

# Use fixed inactive dim value, instead of adjusting according to window opacity.
#inactive-dim-fixed = 1.0

# Specify a list of opacity rules, in the format `PERCENT:PATTERN`, like `50:name *= "Firefox"`. picom-trans is recommended over this. 
opacity-rule = [];

# -----------------------------------

# Parameters for background blurring, see the *BLUR* section for more information.
#blur-method = ;
blur-size = 12;
#blur-deviation = false;

# Blur background of semi-transparent / ARGB windows. 
blur-background = false;

# Blur background of windows when the window frame is not opaque. Implies: blur-background 
#blur-background-frame = false;

# Use fixed blur strength rather than adjusting according to window opacity.
#blur-background-fixed = false;

# Specify the blur convolution kernel
blur-kern = "3x3box";

# Exclude conditions for background blur.
blur-background-exclude = [];

# -----------------------------------

# Specify the backend to use: `xrender`, `glx`, or `xr_glx_hybrid`.
backend = "glx";

# Enable/disable VSync.
vsync = true;

# Enable remote control via D-Bus. See the *D-BUS API* section below for more details.
#dbus = false;

# Try to detect WM windows (a non-override-redirect window with no child that has 'WM_STATE') and mark them as active.
mark-wmwin-focused = true;

# Mark override-redirect windows that doesn't have a child window with 'WM_STATE' focused.
mark-ovredir-focused = true;

# Try to detect windows with rounded corners and don't consider them shaped windows. 
detect-rounded-corners = true;

# Detect '_NET_WM_OPACITY' on client windows, useful for window managers not passing '_NET_WM_OPACITY' of client windows to frame windows.
detect-client-opacity = true;

# Specify refresh rate of the screen. If not specified or 0, picom will try detecting this with X RandR extension.
refresh-rate = 0;

# Use EWMH '_NET_ACTIVE_WINDOW' to determine currently focused window, 
#use-ewmh-active-win = false;

# Use 'WM_TRANSIENT_FOR' to group windows, and consider windows in the same group focused at the same time.
detect-transient = true;

# Use 'WM_CLIENT_LEADER' to group windows, and consider windows in the same group focused at the same time. 
detect-client-leader = true;

# Resize damaged region by a specific number of pixels. Has something todo with blur calculation.
resize-damage = 1;

# Only repaint part of screen that actually changed.
use-damage = true;

# Use X Sync fence to sync clients' draw calls, to make sure all draw calls are finished before picom starts drawing. Needed otherwise will cause error.
xrender-sync-fence = true;

# Set the log level. Possible values are: "trace", "debug", "info", "warn", "error"
log-level = "warn";
